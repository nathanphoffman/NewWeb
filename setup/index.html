<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NewWeb</title>
  <style>
/* ── animation pause ──────────────────────────────────── */
.nw-paused *, .nw-paused *::before, .nw-paused *::after {
  animation-play-state: paused !important;
}

/* ── reset ────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  line-height: 1.6;
}

/* ── top bar ──────────────────────────────────────────── */
#nw-bar {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.4rem 1rem;
  background: var(--bar-bg);
  border-bottom: 1px solid var(--bar-border);
  color: var(--bar-fg);
  font-family: system-ui, sans-serif;
  font-size: 0.85rem;
}

#nw-bar .nw-logo {
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-right: auto;
  opacity: 0.7;
}

#nw-anim-toggle {
  padding: 0.2em 0.7em;
  border: 1px solid var(--bar-border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--bar-fg);
  font-size: 0.82rem;
  cursor: pointer;
}

#nw-bar select {
  padding: 0.2em 0.5em;
  border: 1px solid var(--bar-border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--fg);
  font-size: 0.82rem;
  cursor: pointer;
}

/* ── page content ─────────────────────────────────────── */
#content {
  max-width: var(--width);
  margin: 0 auto;
  padding: 2rem;
}

#content h1, #content h2, #content h3 { margin: 1.2em 0 0.4em; }
#content p   { margin: 0.6em 0; }
#content ul, #content ol { margin: 0.6em 0 0.6em 1.5em; }
#content a   { color: var(--link); }
#content blockquote {
  border-left: 3px solid var(--border);
  padding-left: 1em;
  color: var(--muted);
}
#content code {
  font-family: var(--font-mono);
  background: var(--code-bg);
  padding: 0.1em 0.3em;
  border-radius: 3px;
}
#content pre {
  font-family: var(--font-mono);
  background: var(--code-bg);
  padding: 0.8em;
  border-radius: 4px;
  overflow-x: auto;
}
#content pre code { background: none; padding: 0; }

/* ── spinner ──────────────────────────────────────────── */
#nw-spinner {
  position: fixed; top: 0.5rem; right: 1rem;
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--link);
  border-radius: 50%;
  animation: nw-spin 0.6s linear infinite;
  display: none;
}
@keyframes nw-spin { to { transform: rotate(360deg); } }

/* ── toasts ───────────────────────────────────────────── */
.nw-toast {
  position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
  padding: 0.5em 1.2em; border-radius: 4px; font-size: 0.88em;
  font-family: system-ui, sans-serif; z-index: 200;
  border: 1px solid var(--border);
}
.nw-toast-info  { background: var(--code-bg); color: var(--fg); }
.nw-toast-error { background: #fdd; color: #600; }

/* ── modal ────────────────────────────────────────────── */
dialog {
  background: var(--bg); color: var(--fg);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 1.5rem; max-width: 540px; width: 90%;
}
dialog::backdrop { background: rgba(0,0,0,0.45); }
.nw-modal-close { margin-top: 1rem; padding: 0.3em 1em; cursor: pointer; }

/* ── suspended bar ────────────────────────────────────── */
#nw-suspended {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff3cd; color: #333;
  padding: 0.5em 1rem; border-top: 1px solid #e0c060;
  display: flex; gap: 0.5rem; align-items: center;
  font-family: system-ui, sans-serif; font-size: 0.88em;
}
#nw-suspended button { padding: 0.2em 0.8em; cursor: pointer; }

[data-theme="cats"] {
  --bg:        #0d0a1a;
  --fg:        #f0e8d0;
  --muted:     #8a7a60;
  --link:      #ffb347;
  --border:    rgba(255,179,71,0.2);

}

  background-color: #0d0a1a;

    radial-gradient(circle 80px at 75% 15%, rgba(255,252,220,1) 0%, rgba(255,245,180,0.9) 45%, transparent 70%),
    radial-gradient(circle 220px at 75% 15%, rgba(255,240,150,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 65% 45% at 20% 65%, rgba(80,20,120,0.38) 0%, transparent 70%),
    radial-gradient(ellipse 55% 55% at 82% 82%, rgba(40,10,80,0.28) 0%, transparent 60%),
    radial-gradient(ellipse 70% 30% at 48% 28%, rgba(60,15,100,0.18) 0%, transparent 65%),
    radial-gradient(circle, rgba(255,255,255,0.55) 1px, transparent 1px) 30px  60px  / 180px 160px,
    radial-gradient(circle, rgba(255,255,255,0.4)  1px, transparent 1px) 90px  20px  / 220px 200px,
    radial-gradient(circle, rgba(255,255,255,0.5)  1px, transparent 1px) 150px 90px  / 160px 180px,
    radial-gradient(circle, rgba(255,255,255,0.35) 1px, transparent 1px) 60px  140px / 240px 220px,

  background-attachment: fixed;

@keyframes nw-catspin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.nw-spinning-cat {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  animation: nw-catspin linear infinite;
  filter: drop-shadow(0 0 6px rgba(255,179,71,0.55));
  transform-origin: center center;
}

[data-theme="cats"] #content {
  position: relative;
  z-index: 1;
  background: rgba(13,10,26,0.76);
  border: 1px solid rgba(255,179,71,0.1);
  border-radius: 8px;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);

}

  display: inline-block;
  padding: 0.3em 1.1em;
  border: 1.5px solid rgba(255,179,71,0.55);
  border-radius: 20px;
  color: #ffb347;
  text-decoration: none;
  font-size: 0.88em;
  background: rgba(255,179,71,0.06);
  box-shadow: 0 0 10px rgba(255,179,71,0.12);
  transition: all 0.2s;
}

[data-theme="cats"] #content a:hover {
  background: rgba(255,179,71,0.16);
  border-color: #ffb347;
  box-shadow: 0 0 20px rgba(255,179,71,0.42);
}

[data-theme="cats"] #nw-bar {
  box-shadow: 0 1px 20px rgba(80,20,120,0.5);
}

[data-theme="cats"] .nw-logo {
  color: #ffb347;
  text-shadow: 0 0 10px rgba(255,179,71,0.5);
}

[data-theme="cats"] #nw-bar select {
  background: rgba(10,7,20,0.95);
  border-color: rgba(255,179,71,0.35);
}

[data-theme="cats"] dialog {
  background: rgba(10,7,20,0.96);
  border-color: rgba(255,179,71,0.35);
  box-shadow: 0 0 40px rgba(255,179,71,0.18);
}

/* nebula on body background — frees ::before and ::after for warp layers */
[data-theme="nasa"] body {
  background-color: #060b1a;
  background-image:
    radial-gradient(ellipse 80% 60% at 10% 35%, rgba(11,61,145,0.5)  0%, transparent 70%),
    radial-gradient(ellipse 55% 55% at 88% 60%, rgba(80,0,180,0.28)  0%, transparent 65%),
    radial-gradient(ellipse 45% 35% at 60% 8%,  rgba(252,61,33,0.13) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 35% 92%, rgba(0,80,180,0.22)  0%, transparent 55%);
  background-attachment: fixed;
}

/* warp keyframes — ease-in so stars accelerate like jumping to warp */
@keyframes nw-warp {
  0%   { transform: scale(0.55); opacity: 0;   filter: blur(0px); }
  6%   {                         opacity: 1;                       }
  80%  {                                        filter: blur(0px); }
  92%  {                         opacity: 0.8;  filter: blur(0.8px); }
  100% { transform: scale(2.5);  opacity: 0;   filter: blur(1.5px); }
}

// src/ui.ts
function renderPage(md) {
  document.getElementById("content").innerHTML = window.newwebRender(md);
}
function showToast(md, type) {
  const el = document.createElement("div");
  el.className = `nw-toast nw-toast-${type}`;
  el.innerHTML = window.newwebRender ? window.newwebRender(md) : md;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3e3);
}
function showModal(md, closeLabel = "Close") {
  const dlg = document.createElement("dialog");
  dlg.innerHTML = `<div class="nw-modal-body">${window.newwebRender ? window.newwebRender(md) : md}</div>
    <button class="nw-modal-close" autofocus>${closeLabel}</button>`;
  dlg.querySelector(".nw-modal-close").addEventListener("click", () => {
    if (dlg.onCancel) dlg.onCancel();
    dlg.remove();
  });
  document.body.appendChild(dlg);
  dlg.showModal();
  return dlg;
}
function showSpinner() {
  let s = document.getElementById("nw-spinner");
  if (!s) {
    s = document.createElement("div");
    s.id = "nw-spinner";
    document.body.appendChild(s);
  }
  s.style.display = "block";
}
function hideSpinner() {
  const s = document.getElementById("nw-spinner");
  if (s) s.style.display = "none";
}
function showSuspendedBar(url) {
  const bar = document.createElement("div");
  bar.id = "nw-suspended";
  bar.innerHTML = `Redirect to <b>${url}</b> was cancelled.
    <button id="nw-continue">Continue</button>
    <button id="nw-dismiss">Dismiss</button>`;
  bar.querySelector("#nw-continue").addEventListener("click", () => {
    window.location.href = url;
  });
  bar.querySelector("#nw-dismiss").addEventListener("click", () => bar.remove());
  document.body.appendChild(bar);
}

  const withoutProtocol = href.replace("wasm:", "");

function fetchMd(url) {
  return fetch(url).then((r) => r.text());
}
async function navigateTo(url) {
  const md = await fetchMd(url);
  history.pushState({ mdUrl: url }, "", "#" + url);
  renderPage(md);
}
async function handleMd(a) {
  await navigateTo(a.getAttribute("href").replace("md:", ""));
}
async function handleMore(a) {
  const url = a.getAttribute("href").replace("more:", "");
  const md = await fetchMd(url);
  showModal(md);
}

  await navigateTo(a.getAttribute("href"));
}
function handleRedirect(url, reason) {
  if (url.startsWith("md:")) {
    navigateTo(url.slice(3));
    return;
  }
  let crossDomain = false;
  try {
    crossDomain = new URL(url).hostname !== window.location.hostname;
  } catch (_) {
  }
  if (!crossDomain) {
    window.location.href = url;
    return;
  }
  let count = 3;
  const dlg = showModal(
    `### Leaving site
${reason ? `_${reason}_

` : ""}Navigating to \`${url}\` in <span id="nw-countdown">${count}</span>s\u2026`,
    "Cancel Redirect"
  );
  const countEl = () => dlg.querySelector("#nw-countdown");
  const interval = setInterval(() => {
    count--;
    if (countEl()) countEl().textContent = String(count);
    if (count === 0) {
      clearInterval(interval);
      dlg.remove();

  showSuspendedBar(url);
}

  { x: "6%", y: "22%", size: 64, dur: 4, delay: 0 },
  { x: "83%", y: "14%", size: 48, dur: 6.2, delay: -2.1 },
  { x: "13%", y: "70%", size: 56, dur: 5.1, delay: -1.3 },
  { x: "77%", y: "66%", size: 52, dur: 7.8, delay: -3.5 },
  { x: "46%", y: "80%", size: 44, dur: 3.4, delay: -0.7 },
  { x: "90%", y: "44%", size: 60, dur: 8.3, delay: -4.1 },
  { x: "2%", y: "48%", size: 46, dur: 4.7, delay: -1.8 },
  { x: "60%", y: "30%", size: 50, dur: 5.9, delay: -2.9 }

function addCats() {
  removeCats();
  CAT_DEFS.forEach((d) => {
    const img = document.createElement("img");
    img.src = "engine/img/cat.svg";
    img.className = "nw-spinning-cat";
    img.style.cssText = `left:${d.x};top:${d.y};width:${d.size}px;height:${d.size}px;animation-duration:${d.dur}s;animation-delay:${d.delay}s`;
    document.body.appendChild(img);
  });
}
function removeCats() {
  document.querySelectorAll(".nw-spinning-cat").forEach((el) => el.remove());
}
function applyTheme(theme) {
  const sel = document.getElementById("nw-theme-select");
  document.documentElement.setAttribute("data-theme", theme);
  sel.value = theme;
  if (theme === "cats") addCats();
  else removeCats();
}
function applyAnimPaused(paused) {
  const btn = document.getElementById("nw-anim-toggle");
  document.documentElement.classList.toggle("nw-paused", paused);
  btn.textContent = paused ? "Resume Animations" : "Stop Animations";
}
var savedPaused = localStorage.getItem("nw-paused") === "true";
applyAnimPaused(savedPaused);
document.getElementById("nw-anim-toggle").addEventListener("click", () => {
  const paused = !document.documentElement.classList.contains("nw-paused");
  applyAnimPaused(paused);
  localStorage.setItem("nw-paused", String(paused));
});
var savedTheme = localStorage.getItem("nw-theme");
if (savedTheme) applyTheme(savedTheme);
document.getElementById("nw-theme-select").addEventListener("change", (e) => {
  const value = e.target.value;
  applyTheme(value);
  localStorage.setItem("nw-theme", value);
});

// src/engine.ts
document.addEventListener("click", (e) => {
  const a = e.target.closest("a");
  if (!a) return;
  const href = a.getAttribute("href");
  if (!href) return;
  if (href.startsWith("wasm:")) {
    e.preventDefault();
    handleWasm(a);
  }
  if (href.startsWith("more:")) {
    e.preventDefault();
    handleMore(a);
  }
  if (href.startsWith("md:")) {
    e.preventDefault();
    handleMd(a);
  }
  if (href.startsWith("custom://")) {
    e.preventDefault();
    handleNav(a);
  }
});
window.addEventListener("popstate", async (e) => {
  const url = e.state?.mdUrl ?? "main.md";
  renderPage(await fetchMd(url));
});
(async () => {
  await __wbg_init(new URL("engine/build/pkg/engine_bg.wasm", location.href));
  window.newwebRender = render;
  window.newweb = {
    redirect: (url, reason) => handleRedirect(url, reason),
    info: (md) => showToast(md, "info"),
    error: (md) => showToast(md, "error"),
    more: (md) => showModal(md)
  };
  const initial = location.hash ? location.hash.slice(1) : "main.md";
  history.replaceState({ mdUrl: initial }, "", location.hash || "#main.md");
  renderPage(await fetchMd(initial));
})().catch((err) => {
  document.getElementById("content").innerHTML = `<pre>Boot error: ${err}</pre>`;
});
