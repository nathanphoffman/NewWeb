<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NewWeb</title>
  <style>
/* ── syntax highlight token variables (light default) ──── */
:root {
  --hl-comment:  #717171;
  --hl-string:   #217830;
  --hl-number:   #b32020;
  --hl-keyword:  #0055cc;
  --hl-type:     #1a8090;
  --hl-builtin:  #7a3090;
  --hl-operator: #555555;
}

/* dark themes */
[data-theme="carbon"],
[data-theme="cats"],
[data-theme="aurora"],
[data-theme="cyber"] {
  --hl-comment:  #7c8690;
  --hl-string:   #98c379;
  --hl-number:   #e06c75;
  --hl-keyword:  #61afef;
  --hl-type:     #56b6c2;
  --hl-builtin:  #c678dd;
  --hl-operator: #abb2bf;
}

[data-theme="terminal"] {
  --hl-comment:  #4a7a4a;
  --hl-string:   #7fff7f;
  --hl-number:   #ffff00;
  --hl-keyword:  #00e5ff;
  --hl-type:     #00ffaa;
  --hl-builtin:  #ff79c6;
  --hl-operator: #88ff88;
}

/* ── token rules ───────────────────────────────────────── */
.token.comment                { color: var(--hl-comment); font-style: italic; }
.token.string                 { color: var(--hl-string); }
.token.number,
.token.boolean                { color: var(--hl-number); }
.token.keyword                { color: var(--hl-keyword); font-weight: bold; }
.token.builtin-type           { color: var(--hl-type); }
.token.builtin                { color: var(--hl-builtin); }
.token.operator               { color: var(--hl-operator); }
.token.punctuation            { color: var(--hl-operator); opacity: 0.7; }

/* ── image frames ─────────────────────────────────────── */
.nw-image-frame {
  display: inline-block;
  margin: 1em 0;
  padding: 0.5em;
  border: 1px solid var(--border);
  border-radius: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  background: var(--code-bg);
  max-width: 100%;
  cursor: pointer;
}

.nw-image-frame__img {
  display: block;
  max-width: 320px;
  max-height: 320px;
  width: auto;
  height: auto;
  object-fit: contain;
}

.nw-image-frame__caption {
  display: block;
  margin-top: 0.4em;
  font-size: 0.82em;
  color: var(--muted);
  font-family: inherit;
  text-align: center;
}

/* ── image load button (oversized fallback) ───────────── */
.nw-img-load-btn {
  display: inline-block;
  margin: 1em 0;
  padding: 0.5em 1em;
  border: 1px dashed var(--border);
  border-radius: 4px;
  background: var(--code-bg);
  color: var(--muted);
  font-family: inherit;
  font-size: 0.9em;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.nw-img-load-btn:hover {
  color: var(--fg);
  border-color: var(--link);
}

/* ── lightbox ─────────────────────────────────────────── */
.nw-lightbox {
  position: relative;
  max-width: 85vw;
  max-height: 94vh;
  width: fit-content;
  padding: 0.75rem;
  cursor: pointer;
  overflow: hidden;
}

.nw-lightbox img {
  display: block;
  max-width: calc(85vw - 1.5rem);
  max-height: 82vh;
  width: auto;
  height: auto;
  object-fit: contain;
}

.nw-lightbox__close {
  position: absolute;
  top: 0.35rem;
  right: 0.4rem;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 1.3rem;
  line-height: 1;
  cursor: pointer;
  padding: 0.1em 0.3em;
  border-radius: 3px;
}

.nw-lightbox__close:hover {
  color: var(--fg);
  background: var(--code-bg);
}

.nw-lightbox__caption {
  display: block;
  margin-top: 0.5em;
  font-size: 1.1em;
  color: var(--muted);
  text-align: center;
}

/* ── animation pause ──────────────────────────────────── */
.nw-paused *, .nw-paused *::before, .nw-paused *::after {
  animation-play-state: paused !important;
}

/* ── reset ────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  font-size: var(--font-size);
  line-height: 1.6;
}

/* ── page content ─────────────────────────────────────── */
#content {
  max-width: var(--width);
  margin: 0 auto;
  padding: 1rem 2rem 2rem;
}

#content h1, #content h2, #content h3 { margin: 1.2em 0 0.4em; }
#content p   { margin: 0.6em 0; }
#content hr  { margin: 1.8em 0; border: none; border-top: 1px solid var(--border); }
#content ul, #content ol { margin: 1em 0 1em 1.5em; }
#content li  { margin: 0.3em 0; }
#content a, dialog a { color: var(--link); }
#content blockquote {
  margin: 1.2em 0;
  border-left: 3px solid var(--border);
  padding-left: 1em;
  color: var(--muted);
}
#content code {
  font-family: var(--font-mono);
  background: var(--code-bg);
  padding: 0.1em 0.3em;
  border-radius: 3px;
}
#content pre {
  font-family: var(--font-mono);
  background: var(--code-bg);
  padding: 0.8em;
  border-radius: 4px;
  overflow-x: auto;
}
#content pre code { background: none; padding: 0; }

/* ── link icons ───────────────────────────────────────── */
.nw-link-icon {
  font-size: 1em;
  opacity: 0.5;
  margin-left: 0.2em;
  user-select: none;
}

.nw-wasm-info {
  background: none;
  border: none;
  padding: 0;
  margin-left: 0.2em;
  font-size: 1em;
  opacity: 0.5;
  cursor: pointer;
  color: inherit;
  font-family: inherit;
  user-select: none;
  vertical-align: baseline;
}

/* ── spinner ──────────────────────────────────────────── */
#nw-spinner {
  position: fixed; top: 0.5rem; right: 1rem;
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--link);
  border-radius: 50%;
  animation: nw-spin 0.6s linear infinite;
  display: none;
}
@keyframes nw-spin { to { transform: rotate(360deg); } }

/* ── toasts ───────────────────────────────────────────── */
.nw-toast {
  position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
  padding: 0.5em 1.2em; border-radius: 4px; font-size: 0.88em;
  font-family: system-ui, sans-serif; z-index: 200;
  border: 1px solid var(--border);
}
.nw-toast-info  { background: var(--code-bg); color: var(--fg); }
.nw-toast-error { background: #fdd; color: #600; }

/* ── suspended bar ────────────────────────────────────── */
#nw-suspended {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff3cd; color: #333;
  padding: 0.5em 1rem; border-top: 1px solid #e0c060;
  display: flex; gap: 0.5rem; align-items: center;
  font-family: system-ui, sans-serif; font-size: 0.88em;
}
#nw-suspended button { padding: 0.2em 0.8em; cursor: pointer; }

/* ── modal ────────────────────────────────────────────── */
dialog {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  margin: 0;
  background: var(--bg); color: var(--fg);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 1.5rem; max-width: 540px; width: 90%;
}
dialog::backdrop { background: rgba(0,0,0,0.45); }
.nw-modal-close { margin-top: 1rem; padding: 0.3em 1em; cursor: pointer; }

/* ── top bar ──────────────────────────────────────────── */
#nw-bar {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.9rem 1.5rem;
  background: var(--bar-bg);
  border-bottom: 1px solid var(--bar-border);
  color: var(--bar-fg);
  font-family: system-ui, sans-serif;
  font-size: 1.1rem;
}

#nw-bar .nw-logo {
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-right: auto;
  opacity: 0.7;
  font-size: 1.2rem;
}

#nw-hamburger {
  display: none;
  background: none;
  border: 1px solid var(--bar-border);
  border-radius: 6px;
  color: var(--bar-fg);
  font-size: 1.4rem;
  padding: 0.2em 0.6em;
  cursor: pointer;
}

#nw-bar-menu {
  display: contents;
}

@media (max-width: 768px) {
  #nw-bar {
    flex-wrap: wrap;
    padding: 1rem 1.2rem;
  }

  #nw-hamburger {
    display: block;
  }

  #nw-bar-menu {
    display: none;
    width: 100%;
    flex-direction: column;
    align-items: flex-start;
    gap: 1rem;
    padding: 1rem 0 0.5rem;
    border-top: 1px solid var(--bar-border);
  }

  #nw-bar-menu.open {
    display: flex;
  }
}

#nw-bar button {
  padding: 0.4em 1em;
  border: 1px solid var(--bar-border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--bar-fg);
  font-size: 1rem;
  cursor: pointer;
  font-family: inherit;
}

#nw-bar select {
  padding: 0.4em 0.7em;
  border: 1px solid var(--bar-border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--fg);
  font-size: 1rem;
  cursor: pointer;
}

/* ── settings modal ───────────────────────────────────── */
.nw-settings-modal {
  max-width: 480px;
  width: 90%;
}

.nw-settings-modal h2 {
  margin-bottom: 1.2rem;
  font-size: 1.1rem;
}

.nw-settings-section {
  margin-bottom: 1.2rem;
}

.nw-settings-section h3 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 0.8rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--border);
}

.nw-settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 0.4rem;
}

.nw-settings-row input[type="number"] {
  width: 80px;
  padding: 0.3em 0.5em;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-mono);
  font-size: 0.95rem;
  text-align: right;
}

.nw-settings-hint {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 0.3rem;
}

.nw-settings-actions {
  display: flex;
  gap: 0.6rem;
  justify-content: flex-end;
  margin-top: 1.4rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}

.nw-settings-save {
  padding: 0.4em 1.2em;
  background: var(--link);
  color: var(--bg);
  border: none;
  border-radius: 4px;
  font-family: inherit;
  font-size: 0.95rem;
  cursor: pointer;
}

.nw-settings-cancel {
  padding: 0.4em 1.2em;
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--fg);
  font-family: inherit;
  font-size: 0.95rem;
  cursor: pointer;
}

[data-theme="aurora"] {
  --bg:        #070d1a;
  --fg:        #dff6e8;
  --muted:     #4a8a68;
  --link:      #34d399;
  --border:    rgba(52,211,153,0.15);
  --code-bg:   rgba(0,25,15,0.85);
  --bar-bg:    rgba(4,8,20,0.97);
  --bar-fg:    #34d399;
  --bar-border:rgba(52,211,153,0.2);
  --font:      system-ui, -apple-system, sans-serif;
}

/* shifting aurora curtains */
@keyframes nw-aurora-drift {
  0%   { background-position: 0% 50%;   opacity: 0.55; }
  50%  { background-position: 100% 50%; opacity: 0.75; }
  100% { background-position: 0% 50%;   opacity: 0.55; }
}

[data-theme="aurora"] body {
  background-color: #070d1a;
}

[data-theme="aurora"] body::before {
  content: '';
  position: fixed;
  top: -60%;
  left: -25%;
  width: 150%;
  height: 110%;
  background: linear-gradient(
    135deg,
    rgba(16,185,129,0.22) 0%,
    rgba(6,182,212,0.18) 20%,
    rgba(139,92,246,0.22) 45%,
    rgba(16,185,129,0.16) 70%,
    rgba(59,130,246,0.12) 100%
  );
  background-size: 200% 200%;
  animation: nw-aurora-drift 14s ease-in-out infinite;
  filter: blur(70px);
  z-index: -1;
  pointer-events: none;
}

[data-theme="aurora"] body::after {
  content: '';
  position: fixed;
  top: -40%;
  left: 5%;
  width: 140%;
  height: 90%;
  background: linear-gradient(
    160deg,
    rgba(139,92,246,0.14) 0%,
    rgba(52,211,153,0.18) 35%,
    rgba(6,182,212,0.12) 65%,
    rgba(139,92,246,0.1) 100%
  );
  background-size: 200% 200%;
  animation: nw-aurora-drift 19s ease-in-out infinite reverse;
  filter: blur(55px);
  z-index: -1;
  pointer-events: none;
}

[data-theme="aurora"] #content {
  position: relative;
  z-index: 1;
  background: rgba(7,13,26,0.72);
  border: 1px solid rgba(52,211,153,0.1);
  border-radius: 6px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

[data-theme="aurora"] #content h1,
[data-theme="aurora"] #content h2,
[data-theme="aurora"] #content h3 {
  color: #6ee7b7;
  text-shadow: 0 0 24px rgba(52,211,153,0.45), 0 0 60px rgba(139,92,246,0.2);
  letter-spacing: 0.01em;
}

[data-theme="aurora"] #content a {
  color: #34d399;
  text-decoration: none;
  text-shadow: 0 0 10px rgba(52,211,153,0.45);
  transition: color 0.2s, text-shadow 0.2s;
}

[data-theme="aurora"] #content a:hover {
  color: #a7f3d0;
  text-shadow: 0 0 18px rgba(52,211,153,0.75), 0 0 40px rgba(139,92,246,0.3);
}

[data-theme="aurora"] #content blockquote {
  border-left-color: rgba(139,92,246,0.6);
  color: #4a8a68;
}

[data-theme="aurora"] #nw-bar {
  box-shadow: 0 1px 30px rgba(52,211,153,0.12);
}

[data-theme="aurora"] .nw-logo {
  color: #34d399;
  text-shadow: 0 0 14px rgba(52,211,153,0.6);
}

[data-theme="aurora"] #nw-bar select {
  background: rgba(4,8,20,0.95);
  border-color: rgba(52,211,153,0.3);
}

[data-theme="aurora"] dialog {
  background: rgba(4,8,20,0.96);
  border-color: rgba(52,211,153,0.3);
  box-shadow: 0 0 40px rgba(52,211,153,0.12), 0 0 80px rgba(139,92,246,0.08);
}

[data-theme="aurora"] .nw-image-frame {
  border-color: rgba(52,211,153,0.25);
  box-shadow: 0 0 20px rgba(52,211,153,0.1), 0 0 50px rgba(139,92,246,0.06);
}

[data-theme="carbon"] {
  --bg:        #0f1117;
  --fg:        #e2e8f0;
  --muted:     #64748b;
  --link:      #60a5fa;
  --border:    #1e2532;
  --code-bg:   #080b10;
  --bar-bg:    #0a0d13;
  --bar-fg:    #94a3b8;
  --bar-border:#1e2532;
  --font:      system-ui, -apple-system, sans-serif;
}

[data-theme="carbon"] #nw-bar {
  box-shadow: 0 1px 0 rgba(255,255,255,0.05);
}

[data-theme="carbon"] #content h1,
[data-theme="carbon"] #content h2,
[data-theme="carbon"] #content h3 {
  color: #f1f5f9;
  letter-spacing: -0.02em;
}

[data-theme="carbon"] #content a {
  text-decoration: none;
  border-bottom: 1px solid rgba(96,165,250,0.25);
  transition: color 0.15s, border-color 0.15s;
}

[data-theme="carbon"] #content a:hover {
  color: #93c5fd;
  border-bottom-color: #60a5fa;
}

[data-theme="carbon"] #content blockquote {
  border-left-color: #2563eb;
  color: #94a3b8;
}

[data-theme="carbon"] .nw-image-frame {
  box-shadow: 0 0 0 1px rgba(96,165,250,0.08), 0 4px 16px rgba(0,0,0,0.5);
}

[data-theme="cats"] {
  --bg:        #0d0a1a;
  --fg:        #f0e8d0;
  --muted:     #8a7a60;
  --link:      #ffb347;
  --border:    rgba(255,179,71,0.2);
  --code-bg:   rgba(20,10,35,0.85);
  --bar-bg:    rgba(10,7,20,0.97);
  --bar-fg:    #ffb347;
  --bar-border:rgba(80,40,120,0.9);
  --font:      system-ui, sans-serif;
}

/* moon + night sky + tiled stars on body background */
[data-theme="cats"] body {
  background-color: #0d0a1a;
  background-image:
    radial-gradient(circle 80px at 75% 15%, rgba(255,252,220,1) 0%, rgba(255,245,180,0.9) 45%, transparent 70%),
    radial-gradient(circle 220px at 75% 15%, rgba(255,240,150,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 65% 45% at 20% 65%, rgba(80,20,120,0.38) 0%, transparent 70%),
    radial-gradient(ellipse 55% 55% at 82% 82%, rgba(40,10,80,0.28) 0%, transparent 60%),
    radial-gradient(ellipse 70% 30% at 48% 28%, rgba(60,15,100,0.18) 0%, transparent 65%),
    radial-gradient(circle, rgba(255,255,255,0.55) 1px, transparent 1px) 30px  60px  / 180px 160px,
    radial-gradient(circle, rgba(255,255,255,0.4)  1px, transparent 1px) 90px  20px  / 220px 200px,
    radial-gradient(circle, rgba(255,255,255,0.5)  1px, transparent 1px) 150px 90px  / 160px 180px,
    radial-gradient(circle, rgba(255,255,255,0.35) 1px, transparent 1px) 60px  140px / 240px 220px,
    radial-gradient(circle, rgba(255,255,255,0.45) 1px, transparent 1px) 120px 50px  / 200px 170px,
    radial-gradient(circle, rgba(255,255,255,0.3)  1px, transparent 1px) 10px  100px / 190px 210px;
  background-attachment: fixed;
}

@keyframes nw-catspin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.nw-spinning-cat {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
  animation: nw-catspin linear infinite;
  filter: drop-shadow(0 0 6px rgba(255,179,71,0.55));
  transform-origin: center center;
  transform-box: fill-box;
}

[data-theme="cats"] #content {
  position: relative;
  z-index: 1;
  background: rgba(13,10,26,0.88);
  border: 1px solid rgba(255,179,71,0.1);
  border-radius: 8px;
}

[data-theme="cats"] #content h1,
[data-theme="cats"] #content h2,
[data-theme="cats"] #content h3 {
  color: #ffd080;
  text-shadow: 0 0 16px rgba(255,179,71,0.4);
}

[data-theme="cats"] #content a {
  display: inline-block;
  padding: 0.3em 1.1em;
  border: 1.5px solid rgba(255,179,71,0.55);
  border-radius: 20px;
  color: #ffb347;
  text-decoration: none;
  font-size: 0.88em;
  background: rgba(255,179,71,0.06);
  box-shadow: 0 0 10px rgba(255,179,71,0.12);
  transition: all 0.2s;
}

[data-theme="cats"] #content a:hover {
  background: rgba(255,179,71,0.16);
  border-color: #ffb347;
  box-shadow: 0 0 20px rgba(255,179,71,0.42);
}

[data-theme="cats"] #nw-bar {
  box-shadow: 0 1px 20px rgba(80,20,120,0.5);
}

[data-theme="cats"] .nw-logo {
  color: #ffb347;
  text-shadow: 0 0 10px rgba(255,179,71,0.5);
}

[data-theme="cats"] #nw-bar select {
  background: rgba(10,7,20,0.95);
  border-color: rgba(255,179,71,0.35);
}

[data-theme="cats"] dialog {
  background: rgba(10,7,20,0.96);
  border-color: rgba(255,179,71,0.35);
  box-shadow: 0 0 40px rgba(255,179,71,0.18);
}

[data-theme="cats"] .nw-image-frame {
  border: 1.5px solid rgba(255,179,71,0.55);
  border-radius: 16px;
  background: rgba(20,10,35,0.85);
  box-shadow: 0 0 14px rgba(255,179,71,0.16);
}

[data-theme="cats"] .nw-image-frame__caption {
  color: #8a7a60;
}

[data-theme="cyber"] {
  --bg:        #08000f;
  --fg:        #f0e6ff;
  --muted:     #7c3aed;
  --link:      #00f5d4;
  --border:    rgba(247,37,133,0.2);
  --code-bg:   rgba(18,0,36,0.9);
  --bar-bg:    rgba(4,0,12,0.97);
  --bar-fg:    #f72585;
  --bar-border:rgba(114,9,183,0.55);
  --font:      'Courier New', monospace;
}

/* purple grid */
[data-theme="cyber"] body {
  background-color: #08000f;
  background-image:
    linear-gradient(rgba(114,9,183,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(114,9,183,0.07) 1px, transparent 1px);
  background-size: 44px 44px;
}

/* pulsing neon glow at top */
@keyframes nw-cyber-pulse {
  0%, 100% { opacity: 0.6; }
  50%       { opacity: 1;   }
}

[data-theme="cyber"] body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 220px;

/* nebula on body background — frees ::before and ::after for warp layers */
[data-theme="nasa"] body {
  background-color: #060b1a;
  background-image:
    radial-gradient(ellipse 80% 60% at 10% 35%, rgba(11,61,145,0.5)  0%, transparent 70%),
    radial-gradient(ellipse 55% 55% at 88% 60%, rgba(80,0,180,0.28)  0%, transparent 65%),
    radial-gradient(ellipse 45% 35% at 60% 8%,  rgba(252,61,33,0.13) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 35% 92%, rgba(0,80,180,0.22)  0%, transparent 55%);
  background-attachment: fixed;
}

/* warp keyframes — ease-in so stars accelerate like jumping to warp */
@keyframes nw-warp {
  0%   { transform: scale(0.55); opacity: 0;   filter: blur(0px); }
  6%   {                         opacity: 1;                       }
  80%  {                                        filter: blur(0px); }
  92%  {                         opacity: 0.8;  filter: blur(0.8px); }
  100% { transform: scale(2.5);  opacity: 0;   filter: blur(1.5px); }
}

[data-theme="newspaper"] {
  --bg:        #f4efe6;
  --fg:        #0e0b08;
  --muted:     #6b5a48;
  --link:      #8b1a1a;
  --border:    #c8b89a;
  --code-bg:   #ece5d5;
  --bar-bg:    #0e0b08;
  --bar-fg:    #f4efe6;
  --bar-border:#2a2218;
  --font:      Georgia, "Book Antiqua", Palatino, serif;
  --width:     820px;
}

/* ── masthead bar ──────────────────────────────────────── */
[data-theme="newspaper"] #nw-bar {
  border-bottom: 3px double #f4efe6;
}

[data-theme="newspaper"] .nw-logo {
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-style: italic;
  font-weight: 700;
  letter-spacing: 0.06em;
}

[data-theme="newspaper"] #nw-bar select,
[data-theme="newspaper"] #nw-bar button {
  background: #1e1810;
  color: #f4efe6;
  border-color: #4a3c2c;
}

/* ── headings ──────────────────────────────────────────── */
[data-theme="newspaper"] #content h1,
[data-theme="newspaper"] #content h2,
[data-theme="newspaper"] #content h3 {
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  color: #0e0b08;
  letter-spacing: -0.02em;
}

[data-theme="newspaper"] #content h1 {
  font-size: 2.8em;
  font-weight: 900;
  line-height: 1.05;
  border-bottom: 3px solid #0e0b08;
  padding-bottom: 0.25em;
  margin-bottom: 0.5em;
}

[data-theme="newspaper"] #content h2 {
  font-size: 1.35em;
  font-variant: small-caps;
  letter-spacing: 0.04em;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.2em;
}

[data-theme="newspaper"] #content h3 {
  font-size: 1.1em;
  font-weight: 400;
  font-style: italic;
}

/* ── body text ─────────────────────────────────────────── */
[data-theme="newspaper"] #content p {
  line-height: 1.85;
  margin: 0.75em 0;
}

/* ── links ─────────────────────────────────────────────── */
[data-theme="newspaper"] #content a,
[data-theme="newspaper"] dialog a {
  color: #0e0b08;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-color: #8b1a1a;
  text-decoration-thickness: 1.5px;
}

[data-theme="newspaper"] #content a:hover {
  color: #8b1a1a;
}

/* ── pull-quote blockquotes ────────────────────────────── */
[data-theme="newspaper"] #content blockquote {
  border-left: none;
  text-align: center;
  padding: 1em 3em;
  margin: 2em 0;
  color: #0e0b08;
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-size: 1.35em;
  font-style: italic;
  line-height: 1.45;
  position: relative;
}

[data-theme="newspaper"] #content blockquote::before,
[data-theme="newspaper"] #content blockquote::after {
  font-family: "Palatino Linotype", Palatino, Georgia, serif;
  font-size: 5em;
  line-height: 0;
  position: absolute;
  color: var(--border);
}

[data-theme="newspaper"] #content blockquote::before {
  content: '\201C';
  left: 0.05em;
  top: 0.55em;
}

[data-theme="newspaper"] #content blockquote::after {
  content: '\201D';
  right: 0.05em;
  bottom: -0.1em;
}

/* ── horizontal rules ──────────────────────────────────── */
[data-theme="newspaper"] #content hr {
  border: none;
  border-top: 3px double #0e0b08;
  margin: 2.2em 0;
}

/* ── images ────────────────────────────────────────────── */
[data-theme="newspaper"] .nw-image-frame {
  border: 2px solid #0e0b08;
  box-shadow: 3px 3px 0 #c8b89a;
}

[data-theme="newspaper"] .nw-image-frame__caption {
  font-family: Georgia, serif;
  font-style: italic;
  font-size: 0.78em;
  color: var(--muted);
}

/* ── code ──────────────────────────────────────────────── */
[data-theme="newspaper"] #content code,
[data-theme="newspaper"] #content pre {
  font-size: 0.88em;
  border: 1px solid var(--border);
}
