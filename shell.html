<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NewWeb</title>
  <link rel="stylesheet" href="shared/styles/theme-default.css">
  <link rel="stylesheet" href="shared/styles/theme-carbon.css">
  <link rel="stylesheet" href="shared/styles/theme-stone.css">
  <link rel="stylesheet" href="shared/styles/theme-dark.css">
  <link rel="stylesheet" href="shared/styles/theme-newspaper.css">
  <link rel="stylesheet" href="shared/styles/theme-terminal.css">
  <link rel="stylesheet" href="shared/styles/theme-warm.css">
  <link rel="stylesheet" href="shared/styles/theme-nasa.css">
  <link rel="stylesheet" href="shared/styles/theme-aurora.css">
  <link rel="stylesheet" href="shared/styles/theme-cyber.css">
  <link rel="stylesheet" href="shared/styles/theme-cats.css">
  <link rel="stylesheet" href="shared/styles/layout.css">
  <link rel="stylesheet" href="shared/styles/navbar.css">
  <link rel="stylesheet" href="shared/styles/modal.css">
  <link rel="stylesheet" href="shared/styles/images.css">
  <link rel="stylesheet" href="shared/styles/settings.css">
</head>
<body>
  <div id="nw-bar">
    <span class="nw-logo">NewWeb</span>
    <button id="nw-hamburger" aria-label="Menu" aria-expanded="false">&#9776;</button>
    <div id="nw-bar-menu">
      <button id="nw-view-data">View Data</button>
      <button id="nw-anim-toggle">Stop Animations</button>
      <button id="nw-settings">Settings</button>
      <label for="nw-theme-select" style="opacity:0.6">Theme</label>
      <select id="nw-theme-select">
        <option value="default">Default</option>
        <option value="carbon">Carbon</option>
        <option value="stone">Stone</option>
        <option value="newspaper">Newspaper</option>
        <option value="dark">Dark</option>
        <option value="terminal">Terminal</option>
        <option value="warm">Warm</option>
        <option value="nasa">NASA</option>
        <option value="aurora">Aurora</option>
        <option value="cyber">Cyber</option>
        <option value="cats">Cats</option>
      </select>
    </div>
  </div>

  <div id="content"></div>
  <div id="nw-spinner"></div>

  <script type="module" src="engine/build/engine-electron.bundle.js"></script>
</body>
</html>
